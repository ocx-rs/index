name: push-package

# E2E sandbox harness (announce-revamp Phase 0): on-demand publish of a
# hand-crafted "dual-libc" dummy package -- two OCI image manifests sharing
# platform amd64/linux, differing only in os.features (glibc vs musl) -- to
# ghcr.io/<owner>/ocx-e2e-dummy. Feeds the ocx-index-e2e sandbox's announce
# workflow with real registry content to observe.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to push the dual-libc image index under
        required: false
        default: "1.0.0"

permissions: {}

concurrency:
  group: push-package-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  push:
    name: push
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout this repo's own push-dual-libc.sh
      packages: write # oras push of the dual-libc blobs/manifests/index to GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up oras
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Log in to GHCR and push dual-libc package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY: ghcr.io
          REPO: michael-herwig/ocx-e2e-dummy
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          echo "$GITHUB_TOKEN" | oras login "$REGISTRY" -u "$GITHUB_ACTOR" --password-stdin
          ./push-dual-libc.sh
